name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Laravel API tests
  # ---------------------------------------------------------------------------
  api-tests:
    name: API Tests (PHP 8.2 + MySQL 8)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: oonclick_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -psecret"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: oonclick-api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_mysql, dom, curl, libxml, bcmath, zip, pcntl, intl
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: oonclick-api/vendor
          key: composer-${{ hashFiles('oonclick-api/composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy .env for testing
        run: cp .env.example .env

      - name: Configure test environment
        run: |
          php artisan key:generate
          sed -i 's/DB_HOST=127.0.0.1/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_DATABASE=oonclick/DB_DATABASE=oonclick_test/' .env
          sed -i 's/DB_USERNAME=root/DB_USERNAME=root/' .env
          sed -i 's/DB_PASSWORD=/DB_PASSWORD=secret/' .env

      - name: Run database migrations
        run: php artisan migrate --force

      - name: Run tests
        run: php artisan test --parallel

  # ---------------------------------------------------------------------------
  # Flutter static analysis
  # ---------------------------------------------------------------------------
  flutter-analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: oonclick-mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            oonclick-mobile/.dart_tool
          key: pub-${{ hashFiles('oonclick-mobile/pubspec.lock') }}
          restore-keys: pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Run unit tests
        run: flutter test --coverage

  # ---------------------------------------------------------------------------
  # Flutter release APK build
  # ---------------------------------------------------------------------------
  flutter-build:
    name: Flutter Build APK (release)
    runs-on: ubuntu-latest
    needs: flutter-analyze

    defaults:
      run:
        working-directory: oonclick-mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            oonclick-mobile/.dart_tool
          key: pub-${{ hashFiles('oonclick-mobile/pubspec.lock') }}
          restore-keys: pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: |
          flutter build apk --release \
            --dart-define=API_URL=https://api.oon.click/api \
            --dart-define=PUSHER_CLUSTER=eu

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: oonclick-release-apk
          path: oonclick-mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
