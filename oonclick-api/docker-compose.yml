services:

  app:
    build:
      context: .
      target: app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      # Keep vendor inside the container so the host OS doesn't override it
      - vendor_cache:/var/www/html/vendor
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: oonclick
      DB_USERNAME: oonclick
      DB_PASSWORD: secret
      CACHE_STORE: redis
      QUEUE_CONNECTION: database
      SESSION_DRIVER: file
      REDIS_HOST: redis
      REDIS_PORT: 6379
    networks:
      - oonclick

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - oonclick

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: oonclick
      MYSQL_USER: oonclick
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "oonclick", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oonclick

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - oonclick

volumes:
  mysql_data:
  redis_data:
  vendor_cache:

networks:
  oonclick:
    driver: bridge
