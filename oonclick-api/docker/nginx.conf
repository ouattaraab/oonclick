server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php;

    # Maximum upload size (align with PHP post_max_size / upload_max_filesize)
    client_max_body_size 64M;

    # Compress text responses
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Laravel front-controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pass PHP requests to php-fpm (app container on port 9000)
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    # Serve static assets with aggressive caching
    location ~* \.(css|js|gif|ico|jpg|jpeg|png|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Block access to hidden files except Let's Encrypt well-known
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
