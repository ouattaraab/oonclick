name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  # Cancel in-progress runs on the same branch/PR to save minutes
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Lint — fast feedback before anything expensive runs
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Code Style (Pint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring
          coverage: none
          tools: composer:v2

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies (dev)
        run: composer install --no-interaction --prefer-dist

      - name: Run Pint
        run: vendor/bin/pint --test

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Tests — SQLite in-memory, matching phpunit.xml
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo_sqlite, pdo_mysql, bcmath, gd, zip, intl, pcntl
          coverage: none
          tools: composer:v2

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies (dev)
        run: composer install --no-interaction --prefer-dist

      - name: Setup environment
        run: |
          cp .env.example .env
          php artisan key:generate --ansi

      - name: Run migrations (SQLite in-memory, per phpunit.xml)
        run: php artisan migrate --force --env=testing

      - name: Run test suite
        run: php artisan test --parallel

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Build Docker image — verify the image builds cleanly on every push
  # ─────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    # Only build on pushes (not PRs from forks) to save time
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (cache layers)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: oonclick-api:${{ github.sha }}

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. Deploy — only on pushes to main after all checks pass
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd ~/domains/oon.click/oonclick-api

            echo ">>> Pulling latest code"
            git pull origin main

            echo ">>> Installing Composer dependencies"
            composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

            echo ">>> Running database migrations"
            php artisan migrate --force

            echo ">>> Caching configuration"
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            echo ">>> Restarting queue workers"
            php artisan queue:restart

            echo ">>> Deployment complete"
